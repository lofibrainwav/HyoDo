# HyoDo minimal Docker Compose (optional extended services)
# NOT required for public CLI gates (hyodo check/score/safe).
# Use only when you intentionally run optional extended services.

version: '3.8'

services:
  # Optional Redis for extended modules
  redis:
    image: redis:7-alpine
    container_name: hyodo-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    networks:
      - hyodo-network

  # Optional PostgreSQL for extended modules
  postgres:
    image: postgres:15-alpine
    container_name: hyodo-postgres
    ports:
      - "15432:5432"
    environment:
      POSTGRES_USER: hyodo
      POSTGRES_PASSWORD: hyodo_dev
      POSTGRES_DB: hyodo
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hyodo"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    networks:
      - hyodo-network

volumes:
  redis_data:
    driver: local
  postgres_data:
    driver: local

networks:
  hyodo-network:
    driver: bridge
