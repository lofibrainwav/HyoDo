# Dependabot configuration for HyoDo
# Public product surface is root pyproject.toml.
# afo_core lockfiles are grouped and treated as extended/advisory surface.

version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "public-surface"
    commit-message:
      prefix: "deps"
      include: "scope"

  - package-ecosystem: "pip"
    # SSOT: afo_core/poetry.lock (requirements.txt is intentionally not a pin list)
    directory: "/afo_core"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "afo-core-advisory"
    groups:
      afo-core-security:
        applies-to: security-updates
        patterns:
          - "*"
      afo-core-minor:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
        patterns:
          - "*"
    commit-message:
      prefix: "deps(afo_core)"
      include: "scope"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci"
      include: "scope"
