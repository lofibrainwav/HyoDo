# Dependabot configuration for HyoDo
# Public product surface is root pyproject.toml.

version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "public-surface"
    commit-message:
      prefix: "deps"
      include: "scope"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci"
      include: "scope"

  # afo_core/ is a legacy tree excluded from the public wheel (sdist guard
  # enforces this). Suppress both version and security update PRs for it
  # until the AFO tree's fate is decided (issue #41).
  - package-ecosystem: "pip"
    directory: "/afo_core"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 0
    ignore:
      - dependency-name: "*"
