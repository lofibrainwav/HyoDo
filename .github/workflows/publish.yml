# Publish HyoDo to PyPI via Trusted Publishing (OIDC) only.
# No long-lived API token. Requires:
#   1) GitHub Environment `pypi` (optional approval / protection)
#   2) PyPI Trusted Publisher: owner=lofibrainwav repo=HyoDo
#      workflow=publish.yml environment=pypi
#
# Trigger: annotated tag vX.Y.Z (preferred) or workflow_dispatch of an existing tag.

name: Publish to PyPI

"on":
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing git tag to publish (e.g. v3.1.8)"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: pypi-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build release artifacts
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      commit: ${{ steps.meta.outputs.commit }}
    steps:
      - name: Resolve tag ref
        id: ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          case "$TAG" in
            v[0-9]*.[0-9]*.[0-9]*) ;;
            *)
              echo "Tag must look like vX.Y.Z, got: $TAG"
              exit 1
              ;;
          esac
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Checkout tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ steps.ref.outputs.tag }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Validate tag / VERSION / main ancestry
        id: meta
        run: |
          set -euo pipefail
          TAG="${{ steps.ref.outputs.tag }}"
          VERSION="$(tr -d '[:space:]' < VERSION)"
          EXPECTED="v${VERSION}"
          if [ "$TAG" != "$EXPECTED" ]; then
            echo "Tag/VERSION mismatch: tag=$TAG VERSION=$VERSION (expected $EXPECTED)"
            exit 1
          fi
          python scripts/release/check_version_sync.py
          COMMIT="$(git rev-parse HEAD)"
          git fetch origin main --depth=200
          if ! git merge-base --is-ancestor "$COMMIT" origin/main; then
            echo "Tagged commit $COMMIT is not an ancestor of origin/main"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "commit=$COMMIT" >> "$GITHUB_OUTPUT"
          echo "Publishing candidate: $TAG @ $COMMIT"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Twine check
        run: python -m twine check dist/*

      - name: Guard sdist (no afo_core)
        run: |
          python - <<'PY'
          import tarfile
          from pathlib import Path
          sdist = next(Path("dist").glob("*.tar.gz"))
          with tarfile.open(sdist) as t:
              names = t.getnames()
          bad = [n for n in names if "/afo_core/" in n or n.endswith("/afo_core")]
          assert not bad, f"sdist includes afo_core: {bad[:5]}"
          assert sdist.stat().st_size < 500_000, sdist.stat().st_size
          print(f"sdist clean: {sdist.name} {sdist.stat().st_size} bytes")
          PY

      - name: Upload dist artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Publish to PyPI (OIDC)
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/hyodo
    permissions:
      # Mandatory for Trusted Publishing / OIDC
      id-token: write
      contents: read
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish package distributions to PyPI
        # Pin to v1.13.0 commit (Trusted Publishing + attestations)
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
        with:
          # Prefer attestations when the publisher supports them.
          # Action defaults already enable attestations for trusted publishers.
          verbose: true
          print-hash: true

  verify:
    name: Post-publish readback
    needs: [build, publish]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout scripts
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ needs.build.outputs.tag }}

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Wait for PyPI index + verify provenance / install
        env:
          EXPECTED_VERSION: ${{ needs.build.outputs.version }}
          EXPECTED_COMMIT: ${{ needs.build.outputs.commit }}
        run: |
          python scripts/release/verify-pypi-release.py \
            --version "$EXPECTED_VERSION" \
            --require-provenance \
            --install-smoke \
            --retries 24 \
            --sleep-seconds 10
