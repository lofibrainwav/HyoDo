# Extended AFO Core - advisory checks, decoupled from the public release gate.
#
# These run ONLY when afo_core/ changes, on a weekly schedule (drift observation),
# or on manual dispatch — so ordinary public-package pushes no longer pay the
# ML-dependency-resolution tax. afo_core is advisory and is never shipped in the
# public wheel/sdist; this workflow observes its contract without blocking public CI.

name: Extended AFO Core

"on":
  push:
    branches: [main]
    paths:
      - "afo_core/**"
      - ".github/workflows/afo-core.yml"
  pull_request:
    branches: [main]
    paths:
      - "afo_core/**"
      - ".github/workflows/afo-core.yml"
  schedule:
    # Mondays 06:00 UTC — weekly legacy-contract drift observation.
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: afo-core-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # -----------------------------------------------------------------------
  # Extended AFO Core Quality (lint / format / compile) — was a truth-gate step
  # -----------------------------------------------------------------------
  afo-core-quality:
    name: "Extended AFO Core Quality"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: afo_core/pyproject.toml

      - name: Install lint tooling
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Lint / format / compile afo_core
        run: |
          ruff check afo_core/ --output-format=concise
          ruff format --check afo_core/
          python -m compileall -q afo_core

  # -----------------------------------------------------------------------
  # Extended AFO Core - executable contract (heavy: ML dependency resolution)
  # -----------------------------------------------------------------------
  afo-core-contract:
    name: "Extended AFO Core Contract"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: afo_core/pyproject.toml

      - name: Install AFO server dependencies
        # Install contract SSOT: afo_core/scripts/dev_env.sh (same path as local dev)
        run: bash afo_core/scripts/dev_env.sh --system

      - name: Resolve AFO ML dependencies
        run: pip install --dry-run -e "./afo_core[ml]"

      - name: Run AFO contract tests
        env:
          PYTHONPATH: afo_core
        run: |
          python -m pytest -q \
            afo_core/tests/test_librarian_agent.py \
            afo_core/tests/test_chancellor_v3_routers.py \
            afo_core/tests/test_v3_routing_verification.py \
            afo_core/tests/api/chancellor_v2/test_orchestrator.py \
            afo_core/tests/api/test_api_pillars.py
