name: HyoDo Smoke Test

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke:
    name: Install and CLI Smoke Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate shell scripts
        run: |
          bash -n install.sh
          bash -n install_interactive.sh

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        run: |
          python -m build

      - name: Validate package metadata
        run: |
          python -m twine check dist/*

      - name: Install package
        run: |
          pip install dist/*.whl

      - name: Validate CLI entrypoint
        run: |
          hyodo --help
          hyodo --version
          hyodo safe
          hyodo score --truth 0.9 --goodness 0.9 --beauty 0.9 --benevolence 0.9 --loyalty 0.9

      - name: Validate package import and public API
        run: |
          python - <<'PY'
          import hyodo
          from hyodo import calculate_hygook_v5_score, calculate_trinity_score

          assert hyodo.__version__ == "3.1.0"
          f_score, s_score = calculate_hygook_v5_score(1, 1, 1, 1, 1)
          assert round(f_score, 2) == 60.00
          assert round(s_score, 2) == 10.00
          assert calculate_trinity_score(1, 1, 1, benevolence=1, loyalty=1) == 100
          print("hyodo public API ok")
          PY

      - name: Validate package-mode check command
        run: |
          mkdir -p /tmp/hyodo-smoke-empty
          cd /tmp/hyodo-smoke-empty
          hyodo check

      - name: Validate release docs
        run: |
          grep -q "3.1.0" README.md
          grep -q "3.1.0" CHANGELOG.md
          grep -q "HYOGOOK V5" README.md
          grep -q "HYOGOOK V5" QUICK_START_SIMPLE.md
          grep -q "HYOGOOK V5" CONTRIBUTING.md
          grep -q "Release Candidate" RELEASE_CHECKLIST.md
