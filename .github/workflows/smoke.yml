name: HyoDo Smoke Test

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke:
    name: Install and CLI Smoke Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate shell scripts
        run: |
          bash -n install.sh
          bash -n install_interactive.sh

      - name: Version sync
        run: |
          python scripts/release/check_version_sync.py
          echo "EXPECTED_VERSION=$(tr -d '[:space:]' < VERSION)" >> "$GITHUB_ENV"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        run: |
          python -m build

      - name: Validate package metadata
        run: |
          python -m twine check dist/*

      - name: Guard sdist (no afo_core)
        run: |
          python - <<'PY'
          import tarfile
          from pathlib import Path
          sdist = next(Path("dist").glob("*.tar.gz"))
          with tarfile.open(sdist) as t:
              names = t.getnames()
          bad = [n for n in names if "/afo_core/" in n or n.endswith("/afo_core")]
          assert not bad, f"sdist includes afo_core: {bad[:5]}"
          assert sdist.stat().st_size < 500_000, sdist.stat().st_size
          print(f"sdist clean: {sdist.name} {sdist.stat().st_size} bytes")
          PY

      - name: Install package
        run: |
          pip install dist/*.whl

      - name: Validate CLI entrypoint
        run: |
          hyodo --help
          hyodo --version
          hyodo version
          hyodo start
          hyodo safe
          hyodo score --truth 0.9 --goodness 0.9 --beauty 0.9 --benevolence 0.9 --loyalty 0.9

      - name: Validate package import and public API
        run: |
          python - <<PY
          import hyodo
          from hyodo import calculate_hygook_v5_score, calculate_trinity_score, is_strong_review_signal

          assert hyodo.__version__ == "${{ env.EXPECTED_VERSION }}"
          f_score, s_score = calculate_hygook_v5_score(1, 1, 1, 1, 1)
          assert round(f_score, 2) == 60.00
          assert round(s_score, 2) == 10.00
          assert calculate_trinity_score(1, 1, 1, benevolence=1, loyalty=1) == 100
          assert is_strong_review_signal(95, 5) is True
          print("hyodo public API ok", hyodo.__version__)
          PY

      - name: Validate package-mode check command
        run: |
          mkdir -p /tmp/hyodo-smoke-empty
          cd /tmp/hyodo-smoke-empty
          hyodo check

      - name: Validate release docs
        run: |
          VERSION="$(tr -d '[:space:]' < VERSION)"
          grep -q "$VERSION" README.md
          grep -q "$VERSION" CHANGELOG.md
          grep -q "HYOGOOK V5" README.md
          grep -q "HYOGOOK V5" QUICK_START_SIMPLE.md
          grep -q "HYOGOOK V5" CONTRIBUTING.md
          grep -q "Release readiness" RELEASE_CHECKLIST.md
