# HyoDo CI/CD Pipeline
# Public package release gates + advisory extended AFO checks

name: HyoDo CI

"on":
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # -------------------------------------------------------------------------
  # Truth Gate - Public package release gate
  # -------------------------------------------------------------------------
  truth-gate:
    name: "Truth Gate - Python ${{ matrix.python-version }}"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff Lint Check - Public Package
        run: |
          echo "Ruff lint check for public package..."
          ruff check hyodo/ --output-format=concise
          echo "Public package lint check passed"

      - name: Ruff Format Check - Public Package
        run: |
          echo "Ruff format check for public package..."
          ruff format --check hyodo/
          echo "Public package format check passed"

      - name: Pyright Type Check - Public Package
        run: |
          echo "Pyright type check for public package..."
          pyright hyodo
          echo "Public package type check passed"

      - name: Advisory Ruff Check - Extended AFO Core
        continue-on-error: true
        run: |
          echo "Advisory lint check for extended AFO core..."
          echo "AFO core contains legacy/experimental modules and is not a public package release blocker."
          ruff check afo_core/ --output-format=concise

      - name: Validate JSON
        run: |
          echo "Validating plugin.json..."
          cat .claude-plugin/plugin.json | jq . > /dev/null
          echo "plugin.json is valid"

      - name: Validate YAML
        run: |
          echo "Validating workflow files..."
          python3 - <<'PY'
          import yaml
          for path in ['.github/workflows/ci.yml', '.github/workflows/smoke.yml']:
              with open(path, encoding='utf-8') as f:
                  yaml.safe_load(f)
              print(f'{path} is valid')
          PY

      - name: Check v3.1.0 Files Exist
        run: |
          echo "v3.1.0 files check..."
          required_files=(
            "install_interactive.sh"
            "docker-compose.minimal.yml"
            ".env.minimal"
            "QUICK_START_SIMPLE.md"
            "commands/SKILL_INDEX.md"
            "commands/SKILL_TEMPLATE.md"
          )
          for file in "${required_files[@]}"; do
            if [ -f "$file" ]; then
              echo "Found: $file"
            else
              echo "Missing required v3.1.0 file: $file"
              exit 1
            fi
          done

  # -------------------------------------------------------------------------
  # Goodness Gate - Safety and package smoke tests
  # -------------------------------------------------------------------------
  goodness-gate:
    name: "Goodness Gate - Safety"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run Public Package Smoke Tests
        run: |
          echo "Running public package smoke checks..."
          python - <<'PY'
          import hyodo
          from hyodo import calculate_hygook_v5_score, calculate_trinity_score

          assert hyodo.__version__ == '3.1.0'
          f_score, s_score = calculate_hygook_v5_score(1, 1, 1, 1, 1)
          assert round(f_score, 2) == 60.00
          assert round(s_score, 2) == 10.00
          assert calculate_trinity_score(1, 1, 1, benevolence=1, loyalty=1) == 100
          print('public package smoke checks passed')
          PY

      - name: Run Optional Repository Tests
        continue-on-error: true
        run: |
          echo "Running repository tests as advisory checks..."
          python -m pytest -v --tb=short

      - name: Security Scan
        run: |
          echo "Safety gate check..."
          if grep -r "rm -rf /" . --include="*.sh" 2>/dev/null; then
            echo "Dangerous command detected!"
            exit 1
          fi
          echo "Safety check passed"

      - name: Check Environment Files
        run: |
          test -f ".env.example"
          test -f ".env.minimal"
          echo "Environment template files exist"

  # -------------------------------------------------------------------------
  # Beauty Gate - Documentation and Structure
  # -------------------------------------------------------------------------
  beauty-gate:
    name: "Beauty Gate - Docs"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install markdownlint
        run: npm install -g markdownlint-cli

      - name: Lint Release Markdown
        run: |
          echo "Release documentation quality check..."
          markdownlint README.md QUICK_START_SIMPLE.md CONTRIBUTING.md SECURITY.md CHANGELOG.md RELEASE_CHECKLIST.md || true
          echo "Documentation check complete"

      - name: Check Required Files
        run: |
          echo "Required files check..."
          required_files=(
            "README.md"
            "QUICK_START.md"
            "QUICK_START_SIMPLE.md"
            "CONTRIBUTING.md"
            "CHANGELOG.md"
            "LICENSE"
            "SECURITY.md"
            "RELEASE_CHECKLIST.md"
            "pyproject.toml"
          )
          for file in "${required_files[@]}"; do
            if [ -f "$file" ]; then
              echo "Found: $file"
            else
              echo "Missing required file: $file"
              exit 1
            fi
          done

      - name: Check v3.1.0 Documentation Consistency
        run: |
          grep -q "3.1.0" README.md
          grep -q "3.1.0" CHANGELOG.md
          grep -q "HYOGOOK V5" README.md
          grep -q "HYOGOOK V5" QUICK_START_SIMPLE.md
          grep -q "HYOGOOK V5" CONTRIBUTING.md
          grep -q "Release Candidate" RELEASE_CHECKLIST.md
          echo "v3.1.0 documentation consistency verified"

  # -------------------------------------------------------------------------
  # Final HYOGOOK V5 Release Readiness
  # -------------------------------------------------------------------------
  trinity-score:
    name: "HYOGOOK V5 Score"
    runs-on: ubuntu-latest
    needs: [truth-gate, goodness-gate, beauty-gate]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Calculate HYOGOOK V5 Score
        run: |
          echo "============================================"
          echo "     HyoDo HYOGOOK V5 Score Validation"
          echo "============================================"
          echo ""
          echo "v3.1.0 Public OSS Release"
          echo ""
          echo "Validated release blockers:"
          echo "  - Public package lint/type checks"
          echo "  - HYOGOOK V5 public API smoke checks"
          echo "  - Documentation consistency"
          echo "  - Required release files present"
          echo ""
          echo "Advisory checks:"
          echo "  - Extended AFO core lint/tests are non-blocking until legacy cleanup"
          echo ""
          echo "============================================"
          echo "     Status: READY_FOR_RELEASE_REVIEW"
          echo "============================================"

      - name: Create Score Badge Artifact
        run: |
          echo "HYOGOOK V5" > trinity_score.txt
          echo "Status: READY_FOR_RELEASE_REVIEW" >> trinity_score.txt
