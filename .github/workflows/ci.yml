# HyoDo CI/CD Pipeline
# Public package release gates for the hyodo package and CLI.

name: HyoDo CI

"on":
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Least-privilege default token: this workflow only reads the repo.
permissions:
  contents: read

# Cancel superseded runs on feature branches / PRs, but never cancel main
# (main runs are release-gate signal and must complete).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # -------------------------------------------------------------------------
  # Truth Gate - Public package release gate
  # -------------------------------------------------------------------------
  truth-gate:
    name: "Truth Gate - Python ${{ matrix.python-version }}"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff Lint Check - Public Package
        run: |
          echo "Ruff lint check for public package..."
          ruff check hyodo/ --output-format=concise
          echo "Public package lint check passed"

      - name: Ruff Format Check - Public Package
        run: |
          echo "Ruff format check for public package..."
          ruff format --check hyodo/
          echo "Public package format check passed"

      - name: Pyright Type Check - Public Package
        run: |
          echo "Pyright type check for public package..."
          pyright hyodo
          echo "Public package type check passed"

      - name: Validate JSON
        run: |
          echo "Validating plugin.json..."
          cat .claude-plugin/plugin.json | jq . > /dev/null
          echo "plugin.json is valid"

      - name: Validate YAML
        run: |
          echo "Validating workflow files..."
          python3 - <<'PY'
          import yaml
          for path in [
              '.github/workflows/ci.yml',
              '.github/workflows/smoke.yml',
              '.github/workflows/publish.yml',
          ]:
              with open(path, encoding='utf-8') as f:
                  yaml.safe_load(f)
              print(f'{path} is valid')
          PY

      - name: Check release surface files exist
        run: |
          echo "Release surface files check..."
          required_files=(
            "install_interactive.sh"
            "docker-compose.minimal.yml"
            ".env.minimal"
            "QUICK_START.md"
            "VERSION"
            "scripts/verify-public.sh"
            "scripts/release/check_version_sync.py"
            "RELEASE_CHECKLIST.md"
          )
          for file in "${required_files[@]}"; do
            if [ -f "$file" ]; then
              echo "Found: $file"
            else
              echo "Missing required release file: $file"
              exit 1
            fi
          done
          python scripts/release/check_version_sync.py

  # -------------------------------------------------------------------------
  # Goodness Gate - Safety and package smoke tests
  # -------------------------------------------------------------------------
  goodness-gate:
    name: "Goodness Gate - Safety"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run Public Package Smoke Tests
        run: |
          echo "Running public package smoke checks..."
          EXPECTED="$(tr -d '[:space:]' < VERSION)"
          python - <<PY
          import hyodo
          from hyodo import calculate_hygook_v5_score, calculate_trinity_score, is_strong_review_signal

          assert hyodo.__version__ == "${EXPECTED}"
          f_score, s_score = calculate_hygook_v5_score(1, 1, 1, 1, 1)
          assert round(f_score, 2) == 60.00
          assert round(s_score, 2) == 10.00
          assert calculate_trinity_score(1, 1, 1, benevolence=1, loyalty=1) == 100
          assert is_strong_review_signal(95, 5) is True
          print('public package smoke checks passed', hyodo.__version__)
          PY

      - name: Run Public Package Tests (release blocker)
        run: |
          echo "Running public package tests (blocking)..."
          python -m pytest tests -q --tb=short --cov=hyodo --cov-fail-under=80

      - name: Full `hyodo check` orchestration (release blocker)
        # Prove the advertised CLI integration contract end-to-end at the repo
        # root: all four gates orchestrate to exit 0 with Eternity actually
        # PASSing (not SKIP). The individual tools are checked elsewhere; this is
        # the one-shot orchestration proof the other jobs do not cover.
        run: |
          set +e
          out="$(hyodo check 2>&1)"
          ec=$?
          set -e
          echo "$out"
          test "$ec" -eq 0
          echo "$out" | grep -q "All executed gates passed"
          echo "$out" | grep -q "SBOM generated (public surface)"

      - name: Safe --strict high-risk fixture (release blocker)
        run: |
          printf 'token = ghp_abcdefghijklmnopqrstuvwxyz012345\n' > /tmp/hyodo-ci-secret.txt
          set +e
          hyodo safe --strict /tmp/hyodo-ci-secret.txt
          ec=$?
          set -e
          test "$ec" -eq 1

      - name: Security Scan
        run: |
          echo "Safety gate check..."
          if grep -r "rm -rf /" . --include="*.sh" 2>/dev/null; then
            echo "Dangerous command detected!"
            exit 1
          fi
          echo "Safety check passed"

      - name: Check Environment Files
        run: |
          test -f ".env.example"
          test -f ".env.minimal"
          echo "Environment template files exist"

  # -------------------------------------------------------------------------
  # Beauty Gate - Documentation and Structure
  # -------------------------------------------------------------------------
  beauty-gate:
    name: "Beauty Gate - Docs"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "20"

      - name: Install markdownlint
        run: npm install -g markdownlint-cli

      - name: Lint Public Entry Documentation
        run: |
          markdownlint README.md QUICK_START.md CONTRIBUTING.md AGENTS.md ROADMAP.md PHILOSOPHY.md docs/README.md
          echo "Public entry documentation lint passed"

      - name: Check Required Files
        run: |
          echo "Required files check..."
          required_files=(
            "README.md"
            "QUICK_START.md"
            "CONTRIBUTING.md"
            "CHANGELOG.md"
            "LICENSE"
            "SECURITY.md"
            "RELEASE_CHECKLIST.md"
            "pyproject.toml"
          )
          for file in "${required_files[@]}"; do
            if [ -f "$file" ]; then
              echo "Found: $file"
            else
              echo "Missing required file: $file"
              exit 1
            fi
          done

      - name: Check documentation version consistency
        run: |
          VERSION="$(tr -d '[:space:]' < VERSION)"
          grep -q "$VERSION" CHANGELOG.md
          grep -q "HYOGOOK V5" README.md
          grep -q "HYOGOOK V5" PHILOSOPHY.md
          grep -q "HYOGOOK V5" CONTRIBUTING.md
          grep -q "Release readiness" RELEASE_CHECKLIST.md
          echo "Documentation consistency verified for $VERSION"

      - name: Public docs external-first regression guard
        run: |
          echo "Public docs external-first regression guard..."
          fail=0
          DOCS="README.md QUICK_START.md SECURITY.md"
          # 1. Unevidenced cost claim: "Saves 50-70%" badge/text
          if grep -rEn "Saves[ _-]?50[-–]?70|badge/Saves.*50.*70" $DOCS 2>/dev/null; then
            echo "::error::Banned: 'Saves 50-70%' cost claim (unevidenced). Use softened wording like 'designed to reduce unnecessary expensive-model usage'."
            fail=1
          fi
          # 2. Automation overclaim: auto-approve language on public surfaces
          if grep -rEn "Auto-approve|AUTO_RUN" $DOCS CONTRIBUTING.md RELEASE_CHECKLIST.md hyodo/cli/main.py 2>/dev/null; then
            echo "::error::Banned: auto-approve / AUTO_RUN phrasing on public surfaces. Scores support review, not replace it."
            fail=1
          fi
          # 3. HYOGOOK/Hanja must not lead README (top 15 lines) — practical value first
          if head -15 README.md | grep -En "HYOGOOK|五德|[仁眞善忠美永孝]"; then
            echo "::error::Banned: HYOGOOK/Hanja in README top-15 lines. Lead with practical value; keep philosophy below usage."
            fail=1
          fi
          # 4. Keep one canonical root license. A second LICENSE-like file is
          # rendered by GitHub as another detected license.
          if [ -e LICENSE.md ]; then
            echo "::error::Redundant LICENSE.md found. Keep LICENSE as the single canonical license."
            fail=1
          fi
          # 5. README is a product entry point, not the full documentation set.
          readme_lines="$(wc -l < README.md | tr -d '[:space:]')"
          if [ "$readme_lines" -gt 180 ]; then
            echo "::error::README.md is $readme_lines lines; keep it at or below 180 and move detail to docs/."
            fail=1
          fi
          if [ "$fail" = "1" ]; then
            echo "Public docs external-first regression guard FAILED (BIG-188 policy)"
            exit 1
          fi
          echo "Public docs external-first regression guard passed"

  # -------------------------------------------------------------------------
  # Eternity - public-surface SBOM (advisory: observe first, never blocks)
  # -------------------------------------------------------------------------
  sbom:
    name: "Eternity - Public SBOM"
    runs-on: ubuntu-latest
    # Advisory-first: generating the SBOM must not block the release gate yet.
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies (provides cyclonedx-bom)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Generate public-surface SBOM
        # Builds the public wheel, installs it into a clean venv, and inventories
        # that env — so only typer/rich + transitive appear (self-scope-checked).
        run: python scripts/generate_sbom.py -o dist/sbom.cyclonedx.json

      - name: Verify SBOM scope + reproducibility (real pipeline)
        # Exercises the real build/venv/inventory path twice and asserts scope
        # (no dev/bootstrap leak) and reproducibility — the default suite mocks it.
        env:
          HYODO_SBOM_INTEGRATION: "1"
        run: python -m pytest tests/test_sbom.py -q -k end_to_end

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: hyodo-sbom-cyclonedx
          path: dist/sbom.cyclonedx.json
          if-no-files-found: error
          retention-days: 14

  # -------------------------------------------------------------------------
  # Final HYOGOOK V5 Release Readiness
  # -------------------------------------------------------------------------
  trinity-score:
    name: "HYOGOOK V5 Score"
    runs-on: ubuntu-latest
    needs: [truth-gate, goodness-gate, beauty-gate]

    steps:
      - name: Calculate HYOGOOK V5 Score
        run: |
          echo "============================================"
          echo "     HyoDo HYOGOOK V5 Score Validation"
          echo "============================================"
          echo ""
          echo "Public OSS Release readiness (see VERSION)"
          echo ""
          echo "Validated release blockers:"
          echo "  - Public package lint/type checks"
          echo "  - HYOGOOK V5 public API smoke checks"
          echo "  - Documentation consistency"
          echo "  - Required release files present"
          echo ""
          echo "Advisory checks:"
          echo "  - Markdown lint remains advisory"
          echo ""
          echo "============================================"
          echo "     Status: READY_FOR_RELEASE_REVIEW"
          echo "============================================"

      - name: Create Score Badge Artifact
        run: |
          echo "HYOGOOK V5" > trinity_score.txt
          echo "Status: READY_FOR_RELEASE_REVIEW" >> trinity_score.txt
