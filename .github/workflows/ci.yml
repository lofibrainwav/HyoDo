# HyoDo CI/CD Pipeline
# Python 3.10/3.11/3.12 Matrix Test

name: HyoDo CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # -------------------------------------------------------------------------
  # Truth Gate - Technical Accuracy (Python 3.10/3.11/3.12 Matrix)
  # -------------------------------------------------------------------------
  truth-gate:
    name: "Truth Gate - Python ${{ matrix.python-version }}"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff Lint Check
        run: |
          echo "Ruff lint check..."
          ruff check hyodo/ afo_core/ --output-format=concise
          echo "Lint check passed"

      - name: Ruff Format Check
        run: |
          echo "Ruff format check..."
          ruff format --check hyodo/ afo_core/
          echo "Format check passed"

      - name: Pyright Type Check
        run: |
          echo "Pyright type check..."
          pyright hyodo afo_core || true
          echo "Pyright check complete"

      - name: Validate JSON
        run: |
          echo "Validating plugin.json..."
          cat .claude-plugin/plugin.json | jq . > /dev/null
          echo "plugin.json is valid"

      - name: Validate YAML
        run: |
          echo "Validating workflow files..."
          python3 -c "import yaml; yaml.safe_load(open('.github/workflows/ci.yml'))"
          echo "YAML files are valid"

      - name: Check v3.1.0 Files Exist
        run: |
          echo "v3.1.0 files check..."
          required_files=(
            "install_interactive.sh"
            "docker-compose.minimal.yml"
            ".env.minimal"
            "QUICK_START_SIMPLE.md"
            "commands/SKILL_INDEX.md"
            "commands/SKILL_TEMPLATE.md"
          )
          for file in "${required_files[@]}"; do
            if [ -f "$file" ]; then
              echo "Found: $file"
            else
              echo "Missing required v3.1.0 file: $file"
              exit 1
            fi
          done

  # -------------------------------------------------------------------------
  # Goodness Gate - Safety and Testing
  # -------------------------------------------------------------------------
  goodness-gate:
    name: "Goodness Gate - Safety"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pydantic

      - name: Run Unit Tests
        run: |
          echo "Running unit tests..."
          python -m pytest -v --tb=short

      - name: Security Scan
        run: |
          echo "Safety gate check..."
          if grep -r "rm -rf /" . --include="*.sh" 2>/dev/null; then
            echo "Dangerous command detected!"
            exit 1
          fi
          echo "Safety check passed"

      - name: Check Environment Files
        run: |
          test -f ".env.example"
          test -f ".env.minimal"
          echo "Environment template files exist"

  # -------------------------------------------------------------------------
  # Beauty Gate - Documentation and Structure
  # -------------------------------------------------------------------------
  beauty-gate:
    name: "Beauty Gate - Docs"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install markdownlint
        run: npm install -g markdownlint-cli

      - name: Lint Markdown
        run: |
          echo "Documentation quality check..."
          markdownlint "**/*.md" --ignore node_modules --ignore "**/node_modules/**" || true
          echo "Documentation check complete"

      - name: Check Required Files
        run: |
          echo "Required files check..."
          required_files=(
            "README.md"
            "QUICK_START.md"
            "QUICK_START_SIMPLE.md"
            "CONTRIBUTING.md"
            "CHANGELOG.md"
            "LICENSE"
            "SECURITY.md"
            "pyproject.toml"
          )
          for file in "${required_files[@]}"; do
            if [ -f "$file" ]; then
              echo "Found: $file"
            else
              echo "Missing required file: $file"
              exit 1
            fi
          done

      - name: Check v3.1.0 Documentation Consistency
        run: |
          grep -q "3.1.0" README.md
          grep -q "3.1.0" CHANGELOG.md
          grep -q "HYOGOOK V5" README.md
          grep -q "HYOGOOK V5" QUICK_START_SIMPLE.md
          grep -q "HYOGOOK V5" CONTRIBUTING.md
          echo "v3.1.0 documentation consistency verified"

  # -------------------------------------------------------------------------
  # Final Trinity Score Validation
  # -------------------------------------------------------------------------
  trinity-score:
    name: "HYOGOOK V5 Score"
    runs-on: ubuntu-latest
    needs: [truth-gate, goodness-gate, beauty-gate]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Calculate HYOGOOK V5 Score
        run: |
          echo "============================================"
          echo "     HyoDo HYOGOOK V5 Score Validation"
          echo "============================================"
          echo ""
          echo "v3.1.0 Public OSS Release"
          echo ""
          echo "Validated signals:"
          echo "  - Python 3.10/3.11/3.12 support"
          echo "  - HYOGOOK V5 documentation consistency"
          echo "  - Quick start, contributing, security policy sync"
          echo "  - Required release files present"
          echo ""
          echo "============================================"
          echo "     Status: READY_FOR_RELEASE_REVIEW"
          echo "============================================"

      - name: Create Score Badge Artifact
        run: |
          echo "HYOGOOK V5" > trinity_score.txt
          echo "Status: READY_FOR_RELEASE_REVIEW" >> trinity_score.txt
