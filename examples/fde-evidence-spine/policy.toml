# HyoDo agent policy — schema hyodo.policy/v1
# Place as .hyodo/policy.toml in a customer project (or pass --config / --policy).

schema = "hyodo.policy/v1"

# Hard cap on agent step_index (0-based). Exceeding → DENY max_steps.
max_steps = 20

# When set (including empty list), tool_call/tool_result must use a listed name.
# Omit the key entirely to leave tools unrestricted by allowlist.
allowed_tools = ["search", "read_file", "list_dir"]

# Paths declared on tool.paths that match any glob → DENY data_boundary.
blocked_path_globs = [
  "**/.env",
  "**/.env.*",
  "**/secrets/**",
  "**/*credential*",
]
